# Override for an isolated analysis test stack (use with compose.yaml + .env.test).
services:
  clickhouse:
    container_name: streamtrident-clickhouse-test

  postgres:
    container_name: streamtrident-postgres-test

  trident-migrate:
    container_name: streamtrident-migrate-test
    volumes:
      - ./trident/logs-test:/var/log/trident

  trident-worker:
    container_name: streamtrident-worker-test
    volumes:
      - trident-models:/var/lib/trident/models
      - ./trident/logs-test:/var/log/trident

  trident-api:
    container_name: streamtrident-api-test
    volumes:
      - trident-models:/var/lib/trident/models
      - ./trident/logs-test:/var/log/trident
