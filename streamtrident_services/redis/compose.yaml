services:
  redis:
    image: redis:7-alpine
    container_name: streamtrident-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --bind
      - 0.0.0.0
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:

