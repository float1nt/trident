description: default
decision_tree:
  enabled: true
  max_depth: 6
  min_samples_leaf: 2
  attack_threshold: 0.5
  min_label_count: 5000
visualization:
  metric_audit_min_samples: 50
  metric_audit_max_learners: 60
  # Incrementally flush run artifacts to disk during streaming (auto-enabled when input.source=redis).
  live_flush_enabled: auto
  live_flush_interval_windows: 1
  live_flush_window_csv: true
  live_flush_metric_audit: true
paths:
  data_dir: data
  input_files:
  - aligned_2017_2019_2026_sampled_x5_yeartagged_for_main.csv
  log_file: run.log
  output_dir: outputs
# Data input source. Default is csv and keeps using paths.data_dir/input_files.
# To drain a finite Redis queue/stream batch, set source: redis and configure input.redis.
input:
  source: csv
  redis:
    url: redis://localhost:6379/0
    data_structure: stream # aligned with suricata-cic-redis-live
    key: suricata:cic_flow
    event_type: cic_flow
    max_messages: 0        # 0 = drain until idle_timeout_seconds
    block_timeout_seconds: 1
    idle_timeout_seconds: 5
    default_label: 0000|UNLABELED
    require_label: false
    apply_runtime_filters: false
    allow_unlabeled_initial_learner: true
runtime:
  aggregate_graph_algo: connected_components
  aggregate_max_edges: 80
  aggregate_min_jaccard: 0.15
  aggregate_mutual_top_k: 3
  aggregate_overlap_enabled: true
  aggregate_top_k_edges: 80
  attack_sample_per_type: 0
  benign_accept_scale: 0.34
  benign_sample_max_rows: 0
  cpu_only: false
  debug_overlap_enabled: true
  debug_overlap_max_edges: 80
  debug_overlap_min_jaccard: 0.15
  debug_overlap_top_k_edges: 80
  feature_profile: compact_stats_no_env
  freeze_benign_incremental: false
  max_rows: 0
  # 退化行剔除：任一启用规则中，所列列在数值上「同时」≈0 时整行丢弃（多规则之间为 OR）。
  # 单规则列之间为 AND。用于去掉前/后向包数均为 0 等无信息量流。
  drop_when_all_numeric_zero_rules:
    - name: zero_fwd_bwd_packet_counts
      enabled: true
      columns:
      - Total Fwd Packet
      - Total Bwd packets
      eps: 0.0
      treat_nan_as_zero: true
  year_include:
  - '2017'
  - '2019'
  - '2026'
  protocol_include:
  - tcp
  attack_type_exclude:
  - DrDoS_DNS
  - DrDoS_LDAP
  - DrDoS_MSSQL
  - DrDoS_NetBIOS
  - DrDoS_NTP
  - DrDoS_SNMP
  - DrDoS_SSDP
  - DrDoS_UDP
  - TFTP
  - UDPLag
  run_id: auto_tcp_no_drdos_tftp_udplag_ssdp_fpr_tuned
  seed: 42
  uniform_learner_treatment: false
  use_name_based_benign_logic: false
sampling:
  attack_sample_per_type: 5000
  benign_sample_max_rows: 0
  benign_sample_per_day: 10000
  chunksize: 100000
  data_dir: data
  input_files:
  - aligned_2017_2019/2017_monday.csv
  - aligned_2017_2019/2017_tuesday.csv
  - aligned_2017_2019/2017_wednesday.csv
  - aligned_2017_2019/2017_thursday.csv
  - aligned_2017_2019/2017_friday.csv
  - aligned_2017_2019/2019_DrDoS_DNS.csv
  - aligned_2017_2019/2019_DrDoS_LDAP.csv
  - aligned_2017_2019/2019_DrDoS_MSSQL.csv
  - aligned_2017_2019/2019_DrDoS_NetBIOS.csv
  - aligned_2017_2019/2019_DrDoS_NTP.csv
  - aligned_2017_2019/2019_DrDoS_SNMP.csv
  - aligned_2017_2019/2019_DrDoS_SSDP.csv
  - aligned_2017_2019/2019_DrDoS_UDP.csv
  - aligned_2017_2019/2019_Syn.csv
  - aligned_2017_2019/2019_TFTP.csv
  - aligned_2017_2019/2019_UDPLag.csv
  output_csv: data/aligned_2017_2019_sampled_year_tagged.csv
  report_json: data/aligned_2017_2019_sampled_year_tagged.report.json
  seed: 42
stream:
  init_benign_count: 50000
  init_benign_year: '2017'
  init_known_mode: benign_only
  init_ratio: 0.01
  window_size: 10000
title: CIC2017_to_2019_transfer_aligned_v1_subset
tmagnifier:
  cluster_trigger_size: 120
  dbscan_eps: 1.3
  dbscan_min_samples: 10
  max_unknown_buffer: 30000
  new_class_min_size: 500
tscissors:
  evt_quantile: 0.97
  evt_risk: 0.0015
  fallback_quantile: 0.99
tsieve:
  batch_size: 256
  benign_history_confidence_scale: 1.0
  classifier_backend: ae
  historical_sample_rate: 0.0
  history_samples_per_update: 0
  iforest_n_estimators: 200
  increment_drift_gate_enabled: true
  increment_drift_min_history_samples: 500
  increment_drift_min_score: 0.12
  increment_epochs: 1
  increment_min_samples: 1000
  init_epochs: 5
  lr: 0.001
  max_history_samples_per_learner: 10000
  max_increment_samples: 1000
  max_retrain_per_learner: 0
  max_train_per_class: 20000
  min_class_samples: 300
  new_class_epochs: 4
  threshold_refresh_new_ratio: 0.2
  threshold_refresh_use_anchor: true
