# 单独部署 V3-ui-2（后端在宿主机或其它机器，通过环境变量指向）
services:
  v3-ui-2:
    build: .
    image: v3-ui-2:latest
    container_name: v3-ui-2
    ports:
      - "${UI_HOST_PORT:-8088}:80"
    environment:
      # 去掉 /api 前缀后转发到后端根路径，示例：http://172.16.2.110:9080
      API_AUTH_UPSTREAM: ${API_AUTH_UPSTREAM:-http://host.docker.internal:9080}
      API_TRIDENT_UPSTREAM: ${API_TRIDENT_UPSTREAM:-http://host.docker.internal:8090}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
