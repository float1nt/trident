runtime:
  run_id: ""
  output_root: trident_demo/stress_outputs
  baseline_seconds: 2
  sample_interval_seconds: 1
  wait_after_replay_seconds: 8
  perf_mode: true
  perf_window_size: 20000
  perf_disable_new_learner: false

redis:
  url: redis://127.0.0.1:6379/0
  stream: ""
  stream_maxlen: 1000000
  clear_stream: true
  max_messages: 0
  idle_timeout_seconds: 20

suricata:
  compose_dir: /home/sr/wkf/trident/suricata-cic-redis-live
  image: suricata-cic-live:local
  service: suricata-cic
  container: suricata-cic-live
  iface: eno1
  start: true
  force_recreate: true
  stop_after_run: false

tcpreplay:
  pcap: trident_demo/stress_inputs/Monday-WorkingHours.mtu1500.pcap
  iface: eno1
  use_docker: true
  docker_image: trident-tcpreplay:local
  mbps: 1000
  min_replay_seconds: 20
  min_stream_len: 0
  max_rounds: 2
  pps: 0
  multiplier: 0
  loop: 1
  mtu_trunc: false

trident:
  profile: benchmark
  config: trident_demo/configs/benchmark.yaml
  max_rows: 0
  timeout_seconds: 900
