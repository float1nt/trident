description: independent Trident online Redis consumer
decision_tree:
  enabled: false
visualization:
  enabled: false
  dataset_topology_enabled: false
  learner_topology_enabled: false
  metric_audit_enabled: false
  live_flush_enabled: true
  live_flush_window_csv: true
  live_flush_metric_audit: false
paths:
  data_dir: /home/data
  log_file: run.log
  output_dir: trident_demo/outputs
input:
  source: redis_stream
  redis:
    url: redis://127.0.0.1:6379/0
    data_structure: stream
    key: suricata:cic_flow
    stream: suricata:cic_flow
    event_type: cic_flow
    max_messages: 0
    batch_size: 2000
    block_timeout_seconds: 1
    idle_timeout_seconds: 3
    default_label: 0000|UNLABELED
    require_label: false
    apply_runtime_filters: false
    allow_unlabeled_initial_learner: true
runtime:
  aggregate_overlap_enabled: false
  cpu_only: false
  debug_overlap_enabled: false
  feature_profile: compact_stats_no_env
  max_rows: 0
  performance_benchmark: true
  perf_mode: true
  seed: 42
  uniform_learner_treatment: false
  missing_value_strategy_enabled: true
  missing_value_report_enabled: false
stream:
  init_benign_count: 2500
  init_benign_year: '2017'
  init_known_mode: benign_only
  init_ratio: 0.01
  window_size: 2000
tmagnifier:
  cluster_trigger_size: 120
  dbscan_eps: 1.3
  dbscan_min_samples: 10
  max_unknown_buffer: 30000
  new_class_min_size: 500
tscissors:
  evt_quantile: 0.97
  evt_risk: 0.0015
  fallback_quantile: 0.99
tsieve:
  batch_size: 256
  classifier_backend: ae
  increment_epochs: 1
  increment_min_samples: 1000
  init_epochs: 5
  lr: 0.001
  max_increment_samples: 1000
  max_train_per_class: 20000
  min_class_samples: 300
  new_class_epochs: 4
inject:
  enabled: false
